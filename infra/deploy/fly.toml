# Example Fly.io config for the API. Run from repo root:
#   fly launch --config infra/deploy/fly.toml --dockerfile services/api/Dockerfile
app = "watch-store-api"
primary_region = "iad"

[build]
  dockerfile = "services/api/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/actuator/health"
    timeout = "5s"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  REFRESH_COOKIE_SECURE = "true"
  REFRESH_COOKIE_SAME_SITE = "None"
