# Example Render Blueprint for the API (Docker).
# Import in Render Dashboard or use `render blueprint apply`.
# Frontends deploy separately on Vercel — see docs/deployment.md.
services:
  - type: web
    name: watch-store-api
    runtime: docker
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    healthCheckPath: /api/v1/ping
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: REFRESH_COOKIE_SECURE
        value: "true"
      - key: REFRESH_COOKIE_SAME_SITE
        value: None
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_WEB_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
