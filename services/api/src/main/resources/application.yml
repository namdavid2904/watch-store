spring:
  application:
    name: watch-store-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:watchstore}
    username: ${DB_USER:watchstore}
    password: ${DB_PASSWORD:watchstore}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: email, profile

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits-secret-key-here}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3002}
  s3:
    bucket: ${S3_BUCKET:watch-store-images}
    endpoint: ${S3_ENDPOINT:http://localhost:4566}
    region: ${AWS_REGION:us-east-1}
  stripe:
    enabled: false
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

logging:
  level:
    com.watchstore: INFO
    org.springframework.security: WARN
