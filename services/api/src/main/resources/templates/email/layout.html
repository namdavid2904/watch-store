<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout (content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Watch Store</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f1ec; font-family: Georgia, 'Times New Roman', serif; color: #1a1a1a; }
        .wrapper { max-width: 600px; margin: 0 auto; background-color: #ffffff; }
        .header { padding: 32px 40px 24px; border-bottom: 1px solid #e8e4dc; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; }
        .body { padding: 32px 40px; font-size: 15px; line-height: 1.6; }
        .footer { padding: 24px 40px; background-color: #faf8f5; border-top: 1px solid #e8e4dc; font-size: 12px; color: #6b6560; text-align: center; }
        a { color: #1a1a1a; }
        .muted { color: #6b6560; font-size: 13px; }
        table.items { width: 100%; border-collapse: collapse; margin: 24px 0; font-size: 14px; }
        table.items th, table.items td { padding: 10px 0; border-bottom: 1px solid #e8e4dc; text-align: left; }
        table.items th { font-weight: 400; color: #6b6560; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
        .total { font-size: 16px; font-weight: 600; margin-top: 8px; }
        .address { background-color: #faf8f5; padding: 16px 20px; margin: 16px 0; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>Watch Store</h1>
    </div>
    <div class="body" th:replace="${content}">Content</div>
    <div class="footer">
        <p>&copy; Watch Store. All rights reserved.</p>
    </div>
</div>
</body>
</html>
