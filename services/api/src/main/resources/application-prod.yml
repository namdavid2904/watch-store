spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
  jpa:
    show-sql: false
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      # Set REDIS_URL on Render to full Upstash URL (rediss://...), OR use REDIS_HOST + REDIS_PASSWORD + REDIS_SSL_ENABLED.
      url: ${REDIS_URL:#{null}}

management:
  tracing:
    enabled: false
  otlp:
    tracing:
      export:
        enabled: false
  health:
    redis:
      enabled: false

logging:
  level:
    root: WARN
    com.watchstore: INFO

app:
  s3:
    endpoint: ${S3_ENDPOINT:}
  stripe:
    enabled: ${STRIPE_ENABLED:true}
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  auth:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:None}
