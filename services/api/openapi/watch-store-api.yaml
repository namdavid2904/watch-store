openapi: 3.0.3
info:
  title: Watch Store API
  version: 0.1.0
  description: REST API for the Watch Store e-commerce platform
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /api/v1/products:
    get:
      tags: [Catalog]
      summary: List products with filters
      parameters:
        - in: query
          name: movementType
          schema:
            type: string
            enum: [AUTOMATIC, QUARTZ, MANUAL]
        - in: query
          name: brandId
          schema:
            type: string
            format: uuid
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: caseMaterial
          schema:
            type: string
        - in: query
          name: color
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            default: 20
        - in: query
          name: sort
          schema:
            type: string
            default: createdAt,desc
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
  /api/v1/products/{idOrSlug}:
    get:
      tags: [Catalog]
      summary: Get product by ID or slug
      parameters:
        - in: path
          name: idOrSlug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /api/v1/brands:
    get:
      tags: [Catalog]
      summary: List brands
      responses:
        "200":
          description: Brand list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
  /api/v1/categories:
    get:
      tags: [Catalog]
      summary: List categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /api/v1/admin/products:
    post:
      tags: [Admin Catalog]
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /api/v1/admin/products/{id}/images:
    post:
      tags: [Admin Catalog]
      summary: Upload product image
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Updated product with image key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /api/v1/cart:
    get:
      tags: [Cart]
      summary: Get current cart
      parameters:
        - in: header
          name: X-Cart-Session-Id
          schema:
            type: string
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      tags: [Cart]
      summary: Clear cart
      responses:
        "200":
          description: Cleared cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
  /api/v1/cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemRequest"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
  /api/v1/cart/merge:
    post:
      tags: [Cart]
      summary: Merge guest cart into authenticated user cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Merged cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
  /api/v1/checkout/initiate:
    post:
      tags: [Checkout]
      summary: Reserve inventory and start checkout
      parameters:
        - in: header
          name: X-Cart-Session-Id
          schema:
            type: string
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutInitiateResponse"
  /api/v1/checkout/confirm:
    post:
      tags: [Checkout]
      summary: Confirm checkout and create order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutConfirmRequest"
      responses:
        "200":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutConfirmResponse"
  /api/v1/orders:
    get:
      tags: [Orders]
      summary: List current user orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get order details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ProductPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        brandId:
          type: string
          format: uuid
        brandName:
          type: string
        categoryId:
          type: string
          format: uuid
        categoryName:
          type: string
        color:
          type: string
        images:
          type: array
          items:
            type: string
        movementType:
          type: string
          enum: [AUTOMATIC, QUARTZ, MANUAL]
        caseMaterial:
          type: string
        caseDimension:
          type: string
        waterResistance:
          type: string
        caseThickness:
          type: string
        powerReserve:
          type: string
        movementReference:
          type: string
        quantityAvailable:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
    CreateProductRequest:
      type: object
      required: [name, slug, price, brandId, categoryId, movementType]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
        brandId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        color:
          type: string
        movementType:
          type: string
          enum: [AUTOMATIC, QUARTZ, MANUAL]
        caseMaterial:
          type: string
        caseDimension:
          type: string
        waterResistance:
          type: string
        caseThickness:
          type: string
        powerReserve:
          type: string
        movementReference:
          type: string
        quantityAvailable:
          type: integer
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        itemCount:
          type: integer
        subtotal:
          type: number
        warnings:
          type: array
          items:
            type: string
    CartItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
        productSlug:
          type: string
        unitPrice:
          type: number
        imageUrl:
          type: string
          nullable: true
        quantity:
          type: integer
        lineTotal:
          type: number
    AddCartItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
    CheckoutInitiateResponse:
      type: object
      properties:
        checkoutId:
          type: string
          format: uuid
        totalAmount:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutLineItem"
        expiresAtEpochSeconds:
          type: integer
          format: int64
    CheckoutLineItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
    CheckoutConfirmRequest:
      type: object
      required: [checkoutId]
      properties:
        checkoutId:
          type: string
          format: uuid
        shippingAddress:
          type: object
          additionalProperties: true
    CheckoutConfirmResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING_PAYMENT, PAID, PROCESSING, SHIPPED, DELIVERED, CANCELLED, FAILED]
        totalAmount:
          type: number
        paymentIntentId:
          type: string
        paymentClientSecret:
          type: string
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING_PAYMENT, PAID, PROCESSING, SHIPPED, DELIVERED, CANCELLED, FAILED]
        totalAmount:
          type: number
        paymentIntentId:
          type: string
          nullable: true
        shippingAddress:
          type: object
          additionalProperties: true
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
